name: ablation

on:
  workflow_dispatch:
    inputs:
      steps:
        description: "Training steps per variant"
        required: true
        default: "3000"
      batch_size:
        description: "Batch size"
        required: true
        default: "64"
      eval_batches:
        description: "Eval batches"
        required: true
        default: "50"
      eval_interval:
        description: "Eval interval"
        required: true
        default: "200"
      optimizer:
        description: "Optimizer (adamw or muon)"
        required: true
        default: "muon"

jobs:
  run-ablation:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Run ablation
        run: |
          uv run tilde-ablate \
            --steps "${{ inputs.steps }}" \
            --batch-size "${{ inputs.batch_size }}" \
            --eval-batches "${{ inputs.eval_batches }}" \
            --eval-interval "${{ inputs.eval_interval }}" \
            --optimizer "${{ inputs.optimizer }}"

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ablation-runs
          path: runs/
